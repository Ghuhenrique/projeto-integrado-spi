<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UEG — Sistema de Gestão de Projetos</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!--
    Contêiner único onde todas as telas e modais são injetados dinamicamente.
    O gerenciador-telas.js faz fetch de cada arquivo HTML em /telas/
    e usa insertAdjacentHTML para colocá-lo aqui, apenas uma vez por sessão.
  -->
  <div id="conteiner-telas"></div>

  <!-- 1. Gerenciador de telas: fornece carregarTela() e preCarregarTelas() -->
  <script src="js/gerenciador-telas.js"></script>

  <!-- 2. Gerenciamento de sessão JWT (Auth): deve ser carregado antes de api.js e app.js -->
  <script src="js/auth.js"></script>

  <!-- 3. Camada de API: fornece ApiAuth, ApiProjetos, ApiUsuarios -->
  <script src="js/api.js"></script>

  <!-- 4. Lógica de UI: usa tudo acima -->
  <script src="js/app.js"></script>

</body>

</html>
