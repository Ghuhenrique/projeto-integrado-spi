<!-- ══ TELA: CADASTRAR PROJETO ══ -->
<div id="tela-cadastro-projeto" class="tela">
  <div class="barra-topo">
    <img src="imagens/marca_UEG_horizontal_extenso_branco.png" alt="UEG">
    <div class="barra-topo-direita">
      <div class="pílula-usuario">
        <div class="avatar-usuario prof" id="avatar-cadastro">P</div>
        <span class="nome-usuario" id="nome-usuario-cadastro">Professor</span>
        <span class="badge-perfil prof">Professor</span>
      </div>
      <button class="btn-sair" onclick="realizarLogout()">Sair</button>
    </div>
  </div>

  <div class="cabecalho-pagina">
    <button class="btn-voltar" onclick="irPara('tela-dashboard-professor')">←</button>
    <h2>Cadastrar Novo Projeto</h2>
  </div>

  <div class="corpo-formulario">
    <div class="cartao-formulario">

      <div id="aviso-sucesso-cadastro" class="aviso-sucesso">✅ Projeto cadastrado com sucesso!</div>

      <!-- ── SEÇÃO 1: IDENTIFICAÇÃO ── -->
      <div class="secao-formulario">
        <div class="titulo-secao-form">📋 Identificação</div>

        <div class="campo">
          <label>Nome do Projeto</label>
          <input type="text" id="input-nome-projeto" placeholder="Ex: Pesquisa em Biotecnologia Regional">
        </div>

        <div class="campo">
          <label>Nome do Coordenador</label>
          <input type="text" id="input-nome-coordenador" placeholder="Ex: Prof. Dr. Carlos Lima">
        </div>

        <div class="campo">
          <label>Campus</label>
          <div class="container-select">
            <select id="select-campus">
              <option value="">Selecione o campus...</option>
              <option>Anápolis — CET</option>
              <option>Goiânia — ESEFFEGO</option>
              <option>Goiânia — Laranjeiras</option>
              <option>Inhumas</option>
              <option>Itapuranga</option>
              <option>Iporá</option>
              <option>Jussara</option>
              <option>Morrinhos</option>
              <option>Palmeiras de Goiás</option>
              <option>Pires do Rio</option>
              <option>Porangatu</option>
              <option>Quirinópolis</option>
              <option>São Luís de Montes Belos</option>
              <option>Uruaçu</option>
              <option>Formosa</option>
              <option>Goiás</option>
              <option>Cora Coralina</option>
            </select>
          </div>
        </div>
      </div>

      <!-- ── SEÇÃO 2: PERÍODO E CARGA ── -->
      <div>
        <div class="grupo-campos-inline">
          <div class="campo">
            <label>Data de Início</label>
            <input type="date" id="input-data-inicio">
          </div>
          <div class="separador-periodo">até</div>
          <div class="campo">
            <label>Data de Fim</label>
            <input type="date" id="input-data-fim">
          </div>
        </div>

        <div class="campo">
          <label>Carga Horária Total (horas)</label>
          <input type="number" id="input-carga-horaria" placeholder="Ex: 120" min="1">
        </div>
      </div>

      <!-- ── SEÇÃO 3: DETALHES ── -->
      <div class="secao-formulario">
        <div class="campo">
          <label>Descrição do Projeto</label>
          <textarea id="input-descricao"
            placeholder="Descreva os objetivos, metodologia e resultados esperados do projeto..." rows="4"></textarea>
        </div>

        <div class="campo">
          <label>Situação</label>
          <div class="grupo-radio">
            <label class="radio-opcao">
              <input type="radio" name="situacao-projeto" id="radio-ativo" value="ativo" checked>
              <span class="radio-visual"></span>
              <span class="radio-rotulo">🟢 Ativo</span>
            </label>
            <label class="radio-opcao">
              <input type="radio" name="situacao-projeto" id="radio-finalizado" value="finalizado">
              <span class="radio-visual"></span>
              <span class="radio-rotulo">⚫ Finalizado</span>
            </label>
          </div>
        </div>
      </div>

      <!-- ── SEÇÃO 4: ALUNOS ── -->
      <div class="secao-formulario">
        <div class="titulo-secao-form">👥 Alunos Participantes</div>

        <div id="lista-campos-alunos"></div>

        <button class="btn-adicionar-aluno" onclick="adicionarCampoAluno()">
          <span class="icone-mais">+</span> Adicionar aluno
        </button>
      </div>

      <div id="erro-cadastro-projeto" class="caixa-erro"></div>
      <button class="btn-finalizar-cadastro" id="btn-finalizar-cadastro" onclick="salvarProjeto()">✓ Finalizar
        Cadastro</button>
    </div>
  </div>
</div>
