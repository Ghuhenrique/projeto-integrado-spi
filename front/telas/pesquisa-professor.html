<!-- ══ TELA: PESQUISA PROFESSOR ══ -->
<div id="tela-pesquisa-professor" class="tela">
  <div class="barra-topo">
    <img src="imagens/marca_UEG_horizontal_extenso_branco.png" alt="UEG">
    <div class="barra-topo-direita">
      <div class="pílula-usuario">
        <div class="avatar-usuario prof" id="avatar-pesquisa">P</div>
        <span class="nome-usuario" id="nome-usuario-pesquisa">Professor</span>
        <span class="badge-perfil prof">Professor</span>
      </div>
      <button class="btn-sair" onclick="realizarLogout()">Sair</button>
    </div>
  </div>

  <div class="cabecalho-pagina">
    <button class="btn-voltar" onclick="irPara('tela-dashboard-professor')">←</button>
    <h2>Consultar Projetos</h2>
  </div>

  <div class="corpo-pesquisa">

    <!-- ── BARRA DE FILTROS ── -->
    <div class="barra-filtros">
      <div class="filtros-grupo">

        <!-- Filtro situação: abas rápidas -->
        <div class="filtro-abas">
          <button class="aba-filtro ativa" data-filtro-situacao="todos"
            onclick="aplicarFiltroSituacao('todos', this)">Todos</button>
          <button class="aba-filtro" data-filtro-situacao="ativo" onclick="aplicarFiltroSituacao('ativo', this)">🟢
            Ativos</button>
          <button class="aba-filtro" data-filtro-situacao="finalizado"
            onclick="aplicarFiltroSituacao('finalizado', this)">⚫ Finalizados</button>
        </div>

        <!-- Filtro por campus -->
        <div class="container-select filtro-select">
          <select id="select-filtro-campus" onchange="renderizarListaProjetos()">
            <option value="">Todos os campus</option>
            <option>Anápolis</option>
            <option>Goiânia</option>
            <option>Goianésia</option>
            <option>Aparecida De Goiânia — Laranjeiras</option>
            <option>Inhumas</option>
            <option>Itapuranga</option>
            <option>Iporá</option>
            <option>Jussara</option>
            <option>Morrinhos</option>
            <option>Palmeiras de Goiás</option>
            <option>Pires do Rio</option>
            <option>Porangatu</option>
            <option>Quirinópolis</option>
            <option>São Luís de Montes Belos</option>
            <option>Uruaçu</option>
            <option>Formosa</option>
            <option>Goiás</option>
            <option>Cora Coralina</option>
          </select>
        </div>

        <!-- Filtro por coordenador -->
        <div class="container-select filtro-select">
          <select id="select-filtro-coordenador" onchange="renderizarListaProjetos()">
            <option value="">Todos os coordenadores</option>
          </select>
        </div>

      </div>

      <!-- Contador de resultados -->
      <div class="contador-resultados" id="contador-resultados">0 projeto(s)</div>
    </div>

    <!-- ── LISTA DE PROJETOS ── -->
    <div class="lista-projetos-pesquisa" id="lista-projetos-pesquisa"></div>

  </div>
</div>
<!-- ══ MODAL: DETALHES DO PROJETO ══ -->
<div id="overlay-modal-projeto" class="overlay-modal" onclick="if(event.target===this) fecharModalDetalheProjeto()">
  <div class="modal-projeto">
    <div class="modal-projeto-header">
      <button class="btn-fechar-modal" onclick="fecharModalDetalheProjeto()">✕</button>
    </div>
    <div id="modal-projeto-conteudo" class="modal-projeto-conteudo"></div>
    <div class="modal-projeto-rodape">
      <button id="btn-excluir-modal" class="btn-excluir-projeto" onclick="excluirProjetoModal()">🗑️ Excluir</button>
      <button id="btn-editar-modal" class="btn-editar-projeto" onclick="ativarModoEdicaoModal()">✏️ Editar</button>
      <button id="btn-salvar-modal" class="btn-salvar-edicao" onclick="salvarEdicaoModal()" style="display:none">💾
        Salvar alterações</button>
      <button id="btn-cancelar-edicao-modal" class="btn-cancelar-edicao" onclick="cancelarEdicaoModal()"
        style="display:none">Cancelar</button>
    </div>
  </div>
</div>
