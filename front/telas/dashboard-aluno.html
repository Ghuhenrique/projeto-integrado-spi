<div id="tela-dashboard-aluno" class="tela">
  <div class="barra-topo">
    <img src="imagens/marca_UEG_horizontal_extenso_branco.png" alt="UEG">
    <div class="barra-topo-direita">
      <div class="pílula-usuario">
        <div class="avatar-usuario aluno" id="avatar-aluno">A</div>
        <span class="nome-usuario" id="nome-usuario-aluno">Aluno</span>
        <span class="badge-perfil aluno">Aluno</span>
      </div>
      <button class="btn-sair" onclick="realizarLogout()">Sair</button>
    </div>
  </div>

  <div class="dashboard-aluno">
    <div class="dashboard-aluno-interno">
      <div class="cabecalho-dashboard-aluno">
        <h2>Meus Projetos</h2>
        <p>Projetos dos quais você faz parte como membro participante</p>
        <div class="badge-contador-projetos" id="badge-contador-projetos">📂 0 projeto(s)</div>
      </div>
      <div class="lista-projetos-aluno" id="lista-projetos-aluno"></div>
    </div>
  </div>
</div>
