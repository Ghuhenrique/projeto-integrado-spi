services:
  neo4j:
    image: neo4j:latest
    container_name: neo4j_trabalho_final

    environment:
      - NEO4J_AUTH=neo4j/senha123

    ports:
      - "7474:7474"
      - "7687:7687"

    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
