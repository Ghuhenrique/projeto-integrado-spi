services:
  neo4j:
    image: neo4j:latest
    container_name: neo4j_trabalho_final

    environment:
      - NEO4J_AUTH=neo4j/senha123

    ports:
      - "7474:7474"
      - "7687:7687"

    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

    restart: unless-stopped
  web:
    build: ./front
    container_name: front
    ports:
      - "8080:80" # Acessará em http://localhost:8080

  api:
    build: ./back
    container_name: backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run start:dev
    depends_on:
      - neo4j

volumes:
  neo4j_data:
  neo4j_logs:
